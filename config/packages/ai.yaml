# symfony/ai wiring (ADR-019, ADR-023). Platform component ONLY — no Chat
# (conversation stays host-owned/event-sourced, ADR-004), no Store, no Agent.
#
# Two bridges are registered side-by-side so the host-owned model-profile
# resolver (ADR-014/023) can swap providers by config alone:
#
#   - anthropic: the default behind proxenos.task.chat. ANTHROPIC_API_KEY
#     stays empty in committed defaults; set it in .env.local for live runs.
#     symfony/ai-anthropic-platform exposes the Claude bridge and a default
#     model catalog. claude-sonnet-4-6 is registered here as an additional
#     model so the catalog can route requests to it.
#
#   - generic.default: OpenAI-compatible bridge inherited from Phase 0.0. Used
#     by AiSmokeCommand and serves as the second bridge for verifying
#     ADR-023's "swap by config" DoD requirement.
#
# Because more than one platform is configured the bundle no longer aliases
# Symfony\AI\Platform\PlatformInterface to any single one. The application
# wires Platform instances through src/Ai/ModelProfile/ConfigModelProfileResolver
# (resolves proxenos.task.chat -> the right Platform + model id).
#
# Model ids are passed per-call by the resolver from config (see
# config/packages/proxenos.yaml), not hardcoded here. The bridge ModelClient
# defaults Anthropic max_tokens to 1000; we override per-profile in options.
ai:
    platform:
        anthropic:
            api_key: '%env(ANTHROPIC_API_KEY)%'
        generic:
            default:
                base_url: '%env(LLM_BASE_URL)%'
                api_key: '%env(LLM_API_KEY)%'
                model_catalog: 'Symfony\AI\Platform\Bridge\Generic\FallbackModelCatalog'

    # Register current Claude models in the Anthropic catalog. The shipped
    # default catalog stops at claude-opus-4-1; the 4.6+ family is added here.
    model:
        anthropic:
            claude-sonnet-4-6:
                class: 'Symfony\AI\Platform\Bridge\Anthropic\Claude'
                capabilities:
                    - !php/enum Symfony\AI\Platform\Capability::INPUT_MESSAGES
                    - !php/enum Symfony\AI\Platform\Capability::INPUT_IMAGE
                    - !php/enum Symfony\AI\Platform\Capability::OUTPUT_TEXT
                    - !php/enum Symfony\AI\Platform\Capability::OUTPUT_STREAMING
                    - !php/enum Symfony\AI\Platform\Capability::TOOL_CALLING
                    - !php/enum Symfony\AI\Platform\Capability::THINKING
            claude-opus-4-8:
                class: 'Symfony\AI\Platform\Bridge\Anthropic\Claude'
                capabilities:
                    - !php/enum Symfony\AI\Platform\Capability::INPUT_MESSAGES
                    - !php/enum Symfony\AI\Platform\Capability::INPUT_IMAGE
                    - !php/enum Symfony\AI\Platform\Capability::OUTPUT_TEXT
                    - !php/enum Symfony\AI\Platform\Capability::OUTPUT_STREAMING
                    - !php/enum Symfony\AI\Platform\Capability::TOOL_CALLING
                    - !php/enum Symfony\AI\Platform\Capability::THINKING
