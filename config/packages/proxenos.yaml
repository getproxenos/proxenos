# Proxenos host-owned model-profile map (ADR-014, ADR-023).
#
# Each profile maps a stable, operation-facing name (e.g. chat.frontier) to:
#   - platform: the symfony/ai Platform service key in the locator wired in
#     config/services.yaml (currently: anthropic, generic.default).
#   - model:    the concrete provider model id (model id strings are operator
#     concerns per ADR-008; never user-facing).
#   - options:  default options passed to Platform::invoke() — e.g. max_tokens
#     for the Anthropic bridge (its default of 1000 is too low for chat).
#
# DoD swap verification (ADR-023): the resolver must be able to swap providers
# behind chat.frontier via config alone. The chat.frontier_alt profile points
# at the second bridge to make that explicit and testable. A future operation
# (chat with --profile=chat.frontier_alt) can exercise it; for v0 it documents
# that the seam exists.
parameters:
    proxenos.model_profiles:
        chat.frontier:
            platform: anthropic
            model: claude-sonnet-4-6
            options:
                max_tokens: 8192
        # OpenAI-compatible profile. To make this the active chat profile
        # without touching app code, change `chat.frontier.platform` above
        # from `anthropic` to `generic.default` and set the env vars
        # LLM_BASE_URL / LLM_API_KEY / LLM_CHAT_MODEL. One-line config edit.
        #
        # `stream_options.include_usage: true` is the OpenAI opt-in that asks
        # the streamed response to emit a final `usage` chunk; without it,
        # streamed turns log nothing for token counts (the non-streaming path
        # always returns usage). Anthropic surfaces streamed usage
        # automatically via `message_start`/`message_delta` and needs no
        # equivalent opt-in (see ADR-024).
        chat.frontier_alt:
            platform: generic.default
            model: '%env(LLM_CHAT_MODEL)%'
            options:
                temperature: 0.0
                stream_options:
                    include_usage: true
