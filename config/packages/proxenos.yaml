# Proxenos host-owned model-profile map (ADR-014, ADR-023, ADR-027).
#
# Each profile maps an operation-facing name (`proxenos.task.{chat,reason,
# extract,summarize,embed.text}` per ADR-027's canonical intent list) to:
#   - platform: the symfony/ai Platform service key in the locator wired in
#     config/services.yaml (currently: anthropic, generic.default).
#   - model:    the concrete provider model id (model id strings are operator
#     concerns per ADR-008; never user-facing).
#   - options:  default options passed to Platform::invoke() — e.g. max_tokens
#     for the Anthropic bridge (its default of 1000 is too low for chat).
#   - kind:     reserved per ADR-027. Omission means `completion`. Embedding
#     profiles (`proxenos.task.embed.text`, when added) declare `kind:
#     embedding` and carry a `dimension: int`.
#
# Naming convention (ADR-027): the `proxenos.task.*` prefix is a readability
# convention, not a type. Bare intent (`proxenos.task.chat`) is the default /
# balanced quality variant; suffixes (`.deep`, `.fast`, …) appear only when an
# intent genuinely splits. Bespoke profiles are first-class peers — a feature
# may bind to any name without special handling. The `.generic` peer below is
# exactly that pattern: a bespoke profile that satisfies `task.chat` over the
# OpenAI-compatible bridge.
#
# Feature → profile bindings (ADR-027 v0): config defaults plus an env
# override. The convention is `PROXENOS_{FEATURE}_MODEL_PROFILE`, e.g.
# `PROXENOS_CHAT_MODEL_PROFILE=proxenos.task.chat.generic` would point the
# chat loop at the bridge profile without a code change. The chat loop ships
# the hard-coded default (proxenos.task.chat); features that want
# overridability read the env var in their constructor. Bindings graduate
# into the ADR-014 operation declaration when the registry lands (F2).
#
# DoD swap verification (ADR-023): the resolver can swap providers behind a
# profile via config alone. `proxenos.task.chat.generic` points at the
# second bridge to make that explicit and testable.
parameters:
    proxenos.model_profiles:
        proxenos.task.chat:
            platform: anthropic
            model: claude-sonnet-4-6
            options:
                max_tokens: 8192
        # OpenAI-compatible bespoke peer for `task.chat`. To make this the
        # active chat profile without touching app code, either set
        # `PROXENOS_CHAT_MODEL_PROFILE=proxenos.task.chat.generic` (when the
        # chat loop reads the env override; see ADR-027) or change the
        # `proxenos.task.chat.platform` above from `anthropic` to
        # `generic.default` and set LLM_BASE_URL / LLM_API_KEY /
        # LLM_CHAT_MODEL. Either route is a one-line edit.
        #
        # `stream_options.include_usage: true` is the OpenAI opt-in that asks
        # the streamed response to emit a final `usage` chunk; without it,
        # streamed turns log nothing for token counts (the non-streaming path
        # always returns usage). Anthropic surfaces streamed usage
        # automatically via `message_start`/`message_delta` and needs no
        # equivalent opt-in (see ADR-024).
        proxenos.task.chat.generic:
            platform: generic.default
            model: '%env(LLM_CHAT_MODEL)%'
            options:
                temperature: 0.0
                stream_options:
                    include_usage: true
