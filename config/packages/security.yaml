# Phase 0.1 — console-minted users, password form login, session-based.
# ADR-020. No registration / reset / verification surface (those belong to a
# later phase or to an auth extension under ADR-010). One firewall, one role
# (ROLE_USER); permission enforcement beyond "logged-in" is deferred per ADR-005.
security:
    password_hashers:
        Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface: 'auto'

    providers:
        app_users:
            entity:
                class: App\Entity\User
                property: email

    firewalls:
        dev:
            pattern: ^/(_(profiler|wdt)|css|images|js)/
            security: false
        main:
            lazy: true
            provider: app_users
            form_login:
                login_path: login
                check_path: login
                enable_csrf: true
                username_parameter: _username
                password_parameter: _password
                default_target_path: me
            logout:
                path: logout
                target: home

    access_control:
        - path: ^/login$
          roles: PUBLIC_ACCESS
        - path: ^/me
          roles: ROLE_USER

when@test:
    security:
        password_hashers:
            # Speed the test suite up; the production hasher (auto) is bcrypt/argon
            # at full cost and dominates wall-clock for functional tests.
            Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface:
                algorithm: auto
                cost: 4          # bcrypt cost floor
                time_cost: 3     # argon2id
                memory_cost: 10  # argon2id
