# =============================================================================
# compose.prod.yaml — prod overlay
# =============================================================================
# Usage: docker compose -f compose.common.yaml -f compose.prod.yaml up -d
#
# The deploy environment (Coolify secrets / real env) must provide: APP_IMAGE +
# WORKER_IMAGE (published GHCR refs), APP_SECRET, a strong MERCURE_JWT_SECRET,
# DATABASE_URL (or POSTGRES_* for the bundled db), REDIS_URL (managed Redis DSN
# for the shared cache.app pool — overrides the dev `redis://redis:6379`
# default; backs cross-worker turn-cancellation, step-04), and the LLM_* vars.
# Those flow through the compose.common `x-app-env` passthroughs.

services:
  app:
    image: "${APP_IMAGE:?set APP_IMAGE to the published GHCR app image}"
    environment:
      APP_ENV: prod
      APP_SECRET: "${APP_SECRET:?set APP_SECRET}"
      SSL_MODE: "${SSL_MODE:-full}"
  worker:
    image: "${WORKER_IMAGE:?set WORKER_IMAGE to the published GHCR worker image}"
    environment:
      APP_ENV: prod
      APP_SECRET: "${APP_SECRET:?set APP_SECRET}"
  scheduler:
    image: "${WORKER_IMAGE:?set WORKER_IMAGE to the published GHCR worker image}"
    environment:
      APP_ENV: prod
      APP_SECRET: "${APP_SECRET:?set APP_SECRET}"
  reactor:
    image: "${WORKER_IMAGE:?set WORKER_IMAGE to the published GHCR worker image}"
    environment:
      APP_ENV: prod
      APP_SECRET: "${APP_SECRET:?set APP_SECRET}"
