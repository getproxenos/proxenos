# =============================================================================
# compose.dev.yaml — dev overlay
# =============================================================================
# Usage: docker compose -f compose.common.yaml -f compose.dev.yaml up
# (or `make up`).
#
# Bind-mounts the source tree into all PHP services so edits are live. Host
# UID/GID alignment for bind-mount writes is baked into the dev image at build
# time (USER_ID/GROUP_ID args via `make dev` -> docker-bake.hcl -> the Dockerfile
# `dev` stage's docker-php-serversideup-set-id), so no runtime PUID/PGID env is
# needed here.

x-dev-php: &dev-php
  pull_policy: never
  volumes:
    - ./:/var/www/html
  environment:
    APP_ENV: dev
    APP_DEBUG: "1"
    # Dev-only shared cache.app DSN. Prod must provide a managed Redis DSN via
    # compose.prod.yaml instead of inheriting this local service hostname.
    REDIS_URL: redis://redis:6379

services:
  app:
    <<: *dev-php
  worker:
    <<: *dev-php
  scheduler:
    <<: *dev-php
  reactor:
    <<: *dev-php
  redis:
    # Shared store for the `cache.app` pool (cooperative turn-cancellation +
    # Doctrine result cache). Mirrors prod so cross-worker cancel can be
    # verified locally; the PHP services reach it at redis://redis:6379 from the
    # dev overlay. prod supplies its own managed Redis.
    image: redis:7-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
