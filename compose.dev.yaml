# =============================================================================
# compose.dev.yaml — dev overlay
# =============================================================================
# Usage: docker compose -f compose.common.yaml -f compose.dev.yaml up
# (or `make up` — the Makefile wires these together and exports UID/GID).
#
# Bind-mounts the source tree into all PHP services so edits are live. PUID/PGID
# ask serversideup to align www-data with the host user for bind-mount writes
# (confirm exact var names against serversideup docs — harmless if unsupported).

x-dev-php: &dev-php
  pull_policy: never
  volumes:
    - ./:/var/www/html
  environment:
    APP_ENV: dev
    APP_DEBUG: "1"
    PUID: "${UID:-1000}"
    PGID: "${GID:-1000}"

services:
  app:
    <<: *dev-php
  worker:
    <<: *dev-php
  scheduler:
    <<: *dev-php
  reactor:
    <<: *dev-php
  db:
    # Expose Postgres on the host for local inspection / migrations from the Nix
    # shell. 5433 avoids colliding with a local 5432.
    ports:
      - "5433:5432"
  redis:
    # Shared store for the `cache.app` pool (cooperative turn-cancellation +
    # Doctrine result cache). Mirrors prod so cross-worker cancel can be
    # verified locally; the PHP services reach it at redis://redis:6379 (the
    # committed REDIS_URL default in .env). prod supplies its own managed Redis.
    image: redis:7-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
