; PHP session storage path.
;
; Pins session files under the project's var/ tree so sessions survive a
; `make down && make up` cycle — PHP's default save_path is /tmp, which is
; destroyed with the container. var/ is gitignored at the project root and
; bind-mounted in dev, so files persist on the host but are never committed.
;
; This lives at the PHP layer (rather than framework.session.save_path in
; Symfony) because FrankenPHP worker mode doesn't reliably honor the
; per-request ini_set call Symfony's session storage uses to apply save_path.
; The PHP-level directive takes effect at process start and stays put.
;
; The trailing /dev pins this to one environment; if you swap APP_ENV the
; ini needs a corresponding edit. Acceptable for the dev container's single
; environment lifetime. Prod should use Redis/database sessions anyway.
session.save_path = "/var/www/html/var/sessions/dev"
