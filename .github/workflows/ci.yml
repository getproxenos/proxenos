name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: app
          POSTGRES_USER: app
          POSTGRES_PASSWORD: app
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U app -d app"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      APP_SECRET: ci-secret
      DATABASE_URL: "postgresql://app:app@127.0.0.1:5432/app?serverVersion=16&charset=utf8"

    steps:
      - uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'
          extensions: intl, pdo_pgsql, opcache
          coverage: none
          tools: composer:v2

      - name: Validate composer.json
        run: composer validate --strict --no-check-publish

      - name: Install dependencies
        run: composer install --no-interaction --no-progress --prefer-dist

      - name: Lint container (prod)
        run: php bin/console lint:container --env=prod

      - name: php-cs-fixer (dry-run)
        run: vendor/bin/php-cs-fixer fix --dry-run --diff --config=.php-cs-fixer.dist.php

      - name: PHPStan
        run: vendor/bin/phpstan analyze --no-progress

      - name: Run migrations against throwaway Postgres
        run: php bin/console doctrine:migrations:migrate --no-interaction

      - name: Stub SPA build artifact (SpaControllerTest asserts the path; the
          real Vite build runs in the parallel `frontend` job)
        run: |
          mkdir -p public/app
          printf '<!doctype html><html><body>stub</body></html>\n' > public/app/index.html

      - name: PHPUnit
        run: vendor/bin/phpunit

  frontend:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          package_json_file: frontend/package.json

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint (oxlint)
        run: pnpm run lint

      - name: Format check (prettier)
        run: pnpm run format:check

      - name: Typecheck (tsc)
        run: pnpm run typecheck

      - name: Test (vitest)
        run: pnpm run test

      - name: Build (vite)
        run: pnpm run build
