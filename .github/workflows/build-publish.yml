name: Build & Publish

on:
  push:
    branches: [main]
    tags: ['v*']

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute registry + tag
        id: meta
        run: |
          echo "registry=ghcr.io/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"
          ref="${GITHUB_REF_NAME}"
          if [ "${GITHUB_REF_TYPE}" = "branch" ] && [ "${ref}" = "main" ]; then
            ref="latest"
          fi
          echo "tag=$(echo "${ref}" | sed 's/[^a-zA-Z0-9._-]/-/g')" >> "$GITHUB_OUTPUT"

      - name: Bake & push prod images (app + worker)
        run: |
          docker buildx bake prod --push \
            --set "*.cache-from=type=gha" \
            --set "*.cache-to=type=gha,mode=max"
        env:
          REGISTRY: ${{ steps.meta.outputs.registry }}
          TAG: ${{ steps.meta.outputs.tag }}
